<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Page not found · Barathwaj Maadhavan</title>

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
            rel="stylesheet" />

        <!-- Font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

        <!-- Your main styles (to keep the look consistent) -->
        <link rel="stylesheet" href="styles.css" />

        <style>
            /* Minimal override for the 404 page */
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 48px 24px;
                margin: 0;
                background: var(--bg);
                font-family: 'Inter', sans-serif;
                text-align: center;
            }

            .error-container {
                max-width: 500px;
            }

            .error-code {
                font-family: 'Space Grotesk', sans-serif;
                font-size: 6rem;
                font-weight: 700;
                color: var(--text-primary);
                line-height: 1;
                margin-bottom: 0.5rem;
            }

            .error-title {
                font-family: 'Space Grotesk', sans-serif;
                font-size: 1.8rem;
                font-weight: 600;
                color: var(--text-primary);
                margin-bottom: 0.8rem;
            }

            .error-message {
                font-size: 1.05rem;
                color: var(--text-secondary);
                margin-bottom: 2rem;
                line-height: 1.6;
            }

            .error-home-link {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-family: 'Inter', sans-serif;
                font-weight: 500;
                font-size: 0.95rem;
                color: var(--text-primary);
                text-decoration: none;
                border: 1px solid var(--border);
                padding: 10px 24px;
                border-radius: 60px;
                transition: background 0.2s, border-color 0.2s;
            }

            .error-home-link:hover {
                background: rgba(0, 0, 0, 0.02);
                border-color: var(--text-muted);
            }

            .error-home-link i {
                font-size: 0.9rem;
            }

            .error-footer {
                margin-top: 2.4rem;
                font-size: 0.85rem;
                color: var(--text-muted);
            }

            @media (max-width: 480px) {
                .error-code {
                    font-size: 4.5rem;
                }

                .error-title {
                    font-size: 1.4rem;
                }

                .error-message {
                    font-size: 0.95rem;
                }
            }
        </style>
    </head>

    <body>

        <div class="error-container">
            <div class="error-code">404</div>
            <h1 class="error-title">Page not found</h1>
            <p class="error-message">
                The page you're looking for doesn't exist, or it's probably off exploring new rabbit holes.<br>
                Let's get you back on track.
            </p>
            <a href="index.html" class="error-home-link">
                <i class="fas fa-arrow-left"></i> Back to home
            </a>
            <div class="error-footer">
                &copy; 2026 Barathwaj Maadhavan
            </div>
        </div>

    </body>

</html>
